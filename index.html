<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Trainings-Tracker">
<meta name="theme-color" content="#ffffff">
<title>Trainings-Tracker</title>
<style>
:root {
  --bg: #f5f5f0;
  --card: #ffffff;
  --border: rgba(0,0,0,0.1);
  --border-mid: rgba(0,0,0,0.18);
  --text: #1a1a1a;
  --text2: #666660;
  --text3: #999992;
  --accent: #1D9E75;
  --accent-light: #EAF3DE;
  --blue: #378ADD;
  --blue-light: #E6F1FB;
  --pink: #D4537E;
  --pink-light: #FBEAF0;
  --amber: #BA7517;
  --amber-light: #FAEEDA;
  --red: #E24B4A;
  --radius: 12px;
  --radius-sm: 8px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #111110;
    --card: #1c1c1a;
    --border: rgba(255,255,255,0.1);
    --border-mid: rgba(255,255,255,0.18);
    --text: #f0f0ec;
    --text2: #9a9a94;
    --text3: #666660;
    --accent-light: #0a2318;
    --blue-light: #091c2e;
    --pink-light: #220d15;
    --amber-light: #1e1205;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* bottom nav */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; padding-bottom: var(--safe-bot); background: var(--card); border-top: 0.5px solid var(--border); display: flex; z-index: 100; }
.nav-btn { flex: 1; padding: 10px 0 8px; display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; cursor: pointer; color: var(--text3); font-size: 10px; font-family: inherit; }
.nav-btn.active { color: var(--accent); }
.nav-icon { width: 24px; height: 24px; }

/* main content */
.main { padding: calc(var(--safe-top) + 16px) 16px calc(var(--safe-bot) + 72px); }
.page { display: none; }
.page.active { display: block; }
.page-title { font-size: 22px; font-weight: 600; margin-bottom: 16px; }

/* week selector */
.week-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; scrollbar-width: none; }
.week-scroll::-webkit-scrollbar { display: none; }
.week-chip { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--border-mid); background: transparent; color: var(--text2); font-size: 13px; font-family: inherit; cursor: pointer; white-space: nowrap; }
.week-chip.active { background: var(--text); color: var(--bg); border-color: transparent; }

/* day cards */
.day-card { background: var(--card); border-radius: var(--radius); border: 0.5px solid var(--border); margin-bottom: 10px; overflow: hidden; }
.day-header { padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.day-name { font-size: 14px; font-weight: 500; }
.day-summary { font-size: 12px; color: var(--text3); display: flex; gap: 6px; align-items: center; }
.day-dot { width: 8px; height: 8px; border-radius: 50%; }
.day-body { padding: 0 14px 10px; border-top: 0.5px solid var(--border); }
.check-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 0.5px solid var(--border); cursor: pointer; user-select: none; }
.check-row:last-child { border-bottom: none; }
.cb { width: 22px; height: 22px; border-radius: 6px; border: 1.5px solid var(--border-mid); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
.cb.on { background: var(--accent); border-color: var(--accent); }
.cb.on::after { content: ''; display: block; width: 6px; height: 10px; border: 2px solid #fff; border-top: none; border-left: none; transform: rotate(45deg) translateY(-1px); }
.check-label { font-size: 14px; flex: 1; }
.check-label.done { color: var(--text3); text-decoration: line-through; }
.cat-badge { font-size: 10px; padding: 3px 8px; border-radius: 20px; flex-shrink: 0; }
.cat-gym { background: var(--blue-light); color: var(--blue); }
.cat-run { background: var(--pink-light); color: var(--pink); }
.cat-habit { background: var(--accent-light); color: var(--accent); }

/* run input */
.run-inputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 8px 0 4px; }
.run-field { display: flex; flex-direction: column; gap: 4px; }
.run-field label { font-size: 11px; color: var(--text3); }
.run-field input { background: var(--bg); border: 0.5px solid var(--border-mid); border-radius: var(--radius-sm); padding: 8px 10px; font-size: 14px; font-family: inherit; color: var(--text); width: 100%; }
.run-field input:focus { outline: none; border-color: var(--accent); }
.run-pace { font-size: 12px; color: var(--text3); padding: 0 0 6px; }

/* save bar */
.save-bar { position: fixed; bottom: calc(var(--safe-bot) + 56px); left: 0; right: 0; padding: 10px 16px; background: var(--card); border-top: 0.5px solid var(--border); display: flex; align-items: center; gap: 12px; z-index: 99; }
.save-btn { flex: 1; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 500; font-family: inherit; cursor: pointer; }
.save-toast { font-size: 13px; color: var(--accent); opacity: 0; transition: opacity 0.3s; }

/* stats */
.metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.metric { background: var(--card); border-radius: var(--radius); padding: 14px; border: 0.5px solid var(--border); }
.metric-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.metric-value { font-size: 26px; font-weight: 600; }
.metric-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
.stat-card { background: var(--card); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 14px; margin-bottom: 10px; }
.stat-title { font-size: 15px; font-weight: 500; margin-bottom: 12px; }
.chart-wrap { position: relative; width: 100%; }
.legend-row { display: flex; gap: 14px; margin-bottom: 8px; font-size: 12px; color: var(--text2); flex-wrap: wrap; }
.leg-sq { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 4px; vertical-align: middle; }
.habit-bar-row { margin-bottom: 10px; }
.habit-bar-top { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
.habit-bar-pct { color: var(--text2); font-size: 12px; }
.bar-bg { background: var(--bg); border-radius: 4px; height: 8px; overflow: hidden; }
.bar-fill { height: 8px; border-radius: 4px; }
.streak-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; }
.streak-row:last-child { border-bottom: none; }
.streak-val { color: var(--text2); font-size: 12px; }
.streak-val b { color: var(--text); }

/* run stats */
.run-stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; }
.run-stat-row:last-child { border-bottom: none; }
.run-stat-label { color: var(--text2); }

/* heatmap */
.hm-grid { display: grid; grid-template-columns: repeat(14, 1fr); gap: 3px; margin: 8px 0; }
.hm-cell { aspect-ratio: 1; border-radius: 3px; background: var(--bg); }
.hm-labels { display: grid; grid-template-columns: repeat(14, 1fr); gap: 3px; margin-bottom: 2px; }
.hm-lbl { font-size: 8px; color: var(--text3); text-align: center; }
.hm-legend { display: flex; gap: 12px; font-size: 11px; color: var(--text2); margin-top: 6px; flex-wrap: wrap; }
</style>
</head>
<body>

<div class="main">

  <!-- TRACKER PAGE -->
  <div class="page active" id="page-tracker">
    <div class="page-title">Tracker</div>
    <div class="week-scroll" id="weekScroll"></div>
    <div id="dayCards"></div>
    <div style="height:48px"></div>
  </div>

  <!-- STATS PAGE -->
  <div class="page" id="page-stats">
    <div class="page-title">Statistiken</div>
    <div class="metrics-grid" id="statsMetrics"></div>
    <div class="stat-card">
      <div class="stat-title">Heatmap (Wo 1–8)</div>
      <div class="hm-labels" id="hmLabels"></div>
      <div class="hm-grid" id="heatmap"></div>
      <div class="hm-legend">
        <span><span class="leg-sq" style="background:#85B7EB"></span>Gym</span>
        <span><span class="leg-sq" style="background:#ED93B1"></span>Laufen</span>
        <span><span class="leg-sq" style="background:#5DCAA5"></span>Beides</span>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-title">Trainings pro Woche</div>
      <div class="legend-row">
        <span><span class="leg-sq" style="background:#378ADD"></span>Gym</span>
        <span><span class="leg-sq" style="background:#D4537E"></span>Laufen</span>
      </div>
      <div class="chart-wrap" style="height:200px">
        <canvas id="chartWeekly" role="img" aria-label="Trainings pro Woche Balkendiagramm">Trainings pro Woche</canvas>
      </div>
    </div>
    <div class="stat-card" id="runStatsCard">
      <div class="stat-title">Lauf-Statistiken</div>
      <div id="runStats"></div>
    </div>
    <div class="stat-card">
      <div class="stat-title">Gewohnheiten – Umsetzungsrate</div>
      <div id="habitBars"></div>
    </div>
    <div class="stat-card">
      <div class="stat-title">Streak pro Gewohnheit</div>
      <div id="streakList"></div>
    </div>
  </div>

</div>

<!-- SAVE BAR (only on tracker) -->
<div class="save-bar" id="saveBar">
  <button class="save-btn" onclick="saveAll()">Speichern</button>
  <span class="save-toast" id="saveToast">Gespeichert ✓</span>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="showPage('tracker',this)">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <rect x="3" y="4" width="18" height="16" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/>
      <line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/>
    </svg>
    Tracker
  </button>
  <button class="nav-btn" onclick="showPage('stats',this)">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </svg>
    Statistiken
  </button>
</nav>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
const WEEKS = 8;
const DAYS = ['Mo','Di','Mi','Do','Fr','Sa','So'];

const GYM = [
  {id:'push1', label:'Push I – Brust, Schulter, Trizeps'},
  {id:'pull1', label:'Pull I – Rücken, Bizeps'},
  {id:'legs1', label:'Legs I + Core'},
  {id:'push2', label:'Push II – Brust, Schulter, Trizeps'},
  {id:'pull2', label:'Pull II – Rücken, Bizeps'},
];
const HABITS = [
  {id:'no_smoke', label:'Nicht geraucht'},
  {id:'kcal_def', label:'500 kcal Defizit'},
  {id:'sleep', label:'7+ h Schlaf'},
  {id:'water', label:'2+ L Wasser'},
  {id:'stretch', label:'Mobilisation / Stretching'},
];
const RUN_TYPES = [
  {id:'run_easy', label:'Laufen – Zone 2'},
  {id:'run_tempo', label:'Laufen – Intervall'},
];

let curWeek = 1;
let expandedDay = null;
let state = {};

function skey(w,d){ return 'trk_w'+w+'_d'+d; }

function loadState(){
  state = {};
  for(let w=1;w<=WEEKS;w++){
    state[w]={};
    for(let d=0;d<7;d++){
      try{
        const raw = localStorage.getItem(skey(w,d));
        state[w][d] = raw ? JSON.parse(raw) : {};
      }catch(e){ state[w][d]={}; }
    }
  }
}

function saveAll(){
  for(let w=1;w<=WEEKS;w++){
    for(let d=0;d<7;d++){
      try{ localStorage.setItem(skey(w,d), JSON.stringify(state[w][d]||{})); }catch(e){}
    }
  }
  const t = document.getElementById('saveToast');
  t.style.opacity='1';
  setTimeout(()=>t.style.opacity='0', 2000);
}

function toggle(w,d,id){
  if(!state[w][d]) state[w][d]={};
  state[w][d][id] = !state[w][d][id];
  renderDayCards();
}

function setRunField(w,d,field,val){
  if(!state[w][d]) state[w][d]={};
  state[w][d][field] = val;
  updatePace(w,d);
}

function calcPace(km,min,sec){
  const totalMin = parseFloat(min)||0 + (parseFloat(sec)||0)/60;
  const k = parseFloat(km)||0;
  if(!k||!totalMin) return null;
  const paceMin = totalMin/k;
  const pm = Math.floor(paceMin);
  const ps = Math.round((paceMin-pm)*60);
  return pm+':'+(ps<10?'0':'')+ps+' min/km';
}

function updatePace(w,d){
  const s = state[w][d]||{};
  const el = document.getElementById('pace_w'+w+'_d'+d);
  if(!el) return;
  const p = calcPace(s.run_km, s.run_min, s.run_sec);
  el.textContent = p ? 'Pace: '+p : '';
}

function getDaySummary(w,d){
  const s = state[w][d]||{};
  const hasGym = GYM.some(g=>s[g.id]);
  const hasRun = RUN_TYPES.some(r=>s[r.id]);
  const habitCount = HABITS.filter(h=>s[h.id]).length;
  return {hasGym, hasRun, habitCount};
}

function renderWeekChips(){
  const c = document.getElementById('weekScroll');
  c.innerHTML='';
  for(let w=1;w<=WEEKS;w++){
    const b = document.createElement('button');
    b.className='week-chip'+(w===curWeek?' active':'');
    b.textContent='Woche '+w;
    b.onclick=()=>{ curWeek=w; expandedDay=null; renderWeekChips(); renderDayCards(); };
    c.appendChild(b);
  }
}

function renderDayCards(){
  const c = document.getElementById('dayCards');
  c.innerHTML='';
  for(let d=0;d<7;d++){
    const sum = getDaySummary(curWeek,d);
    const isOpen = expandedDay===d;
    const s = state[curWeek][d]||{};
    const card = document.createElement('div');
    card.className='day-card';

    let dots = '';
    if(sum.hasGym) dots+=`<span class="day-dot" style="background:#378ADD"></span>`;
    if(sum.hasRun) dots+=`<span class="day-dot" style="background:#D4537E"></span>`;
    if(sum.habitCount>0) dots+=`<span style="font-size:11px;color:var(--text3)">${sum.habitCount}/5</span>`;

    card.innerHTML=`<div class="day-header" onclick="toggleDay(${d})">
      <span class="day-name">${DAYS[d]}</span>
      <div class="day-summary">${dots}<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transform:rotate(${isOpen?180:0}deg);transition:transform .2s;flex-shrink:0"><polyline points="6 9 12 15 18 9"/></svg></div>
    </div>`;

    if(isOpen){
      const body = document.createElement('div');
      body.className='day-body';

      // Gym
      const gymLabel = document.createElement('div');
      gymLabel.style.cssText='font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;padding:8px 0 2px;';
      gymLabel.textContent='Gym';
      body.appendChild(gymLabel);
      GYM.forEach(g=>{
        const row = document.createElement('div');
        row.className='check-row';
        const on = !!s[g.id];
        row.innerHTML=`<div class="cb${on?' on':''}"></div><span class="check-label${on?' done':''}">${g.label}</span><span class="cat-badge cat-gym">Gym</span>`;
        row.onclick=()=>toggle(curWeek,d,g.id);
        body.appendChild(row);
      });

      // Run
      const runLabel = document.createElement('div');
      runLabel.style.cssText='font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;padding:8px 0 2px;';
      runLabel.textContent='Laufen';
      body.appendChild(runLabel);
      RUN_TYPES.forEach(r=>{
        const row = document.createElement('div');
        row.className='check-row';
        const on = !!s[r.id];
        row.innerHTML=`<div class="cb${on?' on':''}"></div><span class="check-label${on?' done':''}">${r.label}</span><span class="cat-badge cat-run">Laufen</span>`;
        row.onclick=()=>toggle(curWeek,d,r.id);
        body.appendChild(row);
      });

      // Run details
      const runDetail = document.createElement('div');
      const km = s.run_km||'';
      const min = s.run_min||'';
      const sec = s.run_sec||'';
      runDetail.innerHTML=`
        <div class="run-inputs">
          <div class="run-field">
            <label>Distanz (km)</label>
            <input type="number" inputmode="decimal" step="0.1" min="0" placeholder="5.0" value="${km}" id="inp_km_${d}" onchange="setRunField(${curWeek},${d},'run_km',this.value);updatePace(${curWeek},${d})">
          </div>
          <div class="run-field">
            <label>Zeit (min)</label>
            <input type="number" inputmode="numeric" min="0" placeholder="43" value="${min}" id="inp_min_${d}" onchange="setRunField(${curWeek},${d},'run_min',this.value);updatePace(${curWeek},${d})">
          </div>
          <div class="run-field">
            <label>Sekunden</label>
            <input type="number" inputmode="numeric" min="0" max="59" placeholder="00" value="${sec}" id="inp_sec_${d}" onchange="setRunField(${curWeek},${d},'run_sec',this.value);updatePace(${curWeek},${d})">
          </div>
        </div>
        <div class="run-pace" id="pace_w${curWeek}_d${d}"></div>`;
      body.appendChild(runDetail);

      // Habits
      const habLabel = document.createElement('div');
      habLabel.style.cssText='font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;padding:8px 0 2px;';
      habLabel.textContent='Gewohnheiten';
      body.appendChild(habLabel);
      HABITS.forEach(h=>{
        const row = document.createElement('div');
        row.className='check-row';
        const on = !!s[h.id];
        row.innerHTML=`<div class="cb${on?' on':''}"></div><span class="check-label${on?' done':''}">${h.label}</span><span class="cat-badge cat-habit">Habit</span>`;
        row.onclick=()=>toggle(curWeek,d,h.id);
        body.appendChild(row);
      });

      card.appendChild(body);
      setTimeout(()=>updatePace(curWeek,d),50);
    }
    c.appendChild(card);
  }
}

function toggleDay(d){
  expandedDay = expandedDay===d ? null : d;
  renderDayCards();
  if(expandedDay!==null){
    setTimeout(()=>{
      const cards = document.querySelectorAll('.day-card');
      if(cards[d]) cards[d].scrollIntoView({behavior:'smooth',block:'nearest'});
    },100);
  }
}

function showPage(id, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
  document.getElementById('saveBar').style.display = id==='tracker' ? 'flex' : 'none';
  if(id==='stats') renderStats();
}

function getStats(){
  const gymPW=[], runPW=[];
  let totalGym=0, totalRun=0, active=0, totalDays=0;
  let allRuns=[];

  for(let w=1;w<=WEEKS;w++){
    let g=0,r=0;
    for(let d=0;d<7;d++){
      const s=state[w][d]||{};
      totalDays++;
      const hg=GYM.some(x=>s[x.id]);
      const hr=RUN_TYPES.some(x=>s[x.id]);
      if(hg){g++;totalGym++;}
      if(hr){
        r++;totalRun++;
        if(s.run_km){
          const totalMin=(parseFloat(s.run_min)||0)+(parseFloat(s.run_sec)||0)/60;
          allRuns.push({w,d,km:parseFloat(s.run_km),min:totalMin});
        }
      }
      if(hg||hr) active++;
    }
    gymPW.push(g); runPW.push(r);
  }

  const habitRates={};
  HABITS.forEach(h=>{
    let done=0;
    for(let w=1;w<=WEEKS;w++)
      for(let d=0;d<7;d++)
        if((state[w][d]||{})[h.id]) done++;
    habitRates[h.id]={done, rate:totalDays>0?Math.round(done/totalDays*100):0, label:h.label};
  });

  const streaks={};
  HABITS.forEach(h=>{
    let cur=0,max=0;
    for(let w=1;w<=WEEKS;w++)
      for(let d=0;d<7;d++){
        if((state[w][d]||{})[h.id]){cur++;max=Math.max(max,cur);}
        else cur=0;
      }
    streaks[h.id]={current:cur,max,label:h.label};
  });

  const totalKm = allRuns.reduce((a,r)=>a+r.km,0);
  const avgKm = allRuns.length ? totalKm/allRuns.length : 0;
  const bestKm = allRuns.length ? Math.max(...allRuns.map(r=>r.km)) : 0;
  const avgPace = allRuns.length ?
    allRuns.filter(r=>r.min>0).reduce((a,r)=>{ const p=r.min/r.km; return a+p; },0) / (allRuns.filter(r=>r.min>0).length||1) : 0;

  return{gymPW,runPW,totalGym,totalRun,active,totalDays,habitRates,streaks,allRuns,totalKm,avgKm,bestKm,avgPace};
}

function fmtPace(paceMin){
  if(!paceMin) return '–';
  const pm=Math.floor(paceMin);
  const ps=Math.round((paceMin-pm)*60);
  return pm+':'+(ps<10?'0':'')+ps+' min/km';
}

function renderStats(){
  const s=getStats();

  document.getElementById('statsMetrics').innerHTML=`
    <div class="metric"><div class="metric-label">Gym-Einheiten</div><div class="metric-value">${s.totalGym}</div><div class="metric-sub">gesamt</div></div>
    <div class="metric"><div class="metric-label">Laufeinheiten</div><div class="metric-value">${s.totalRun}</div><div class="metric-sub">gesamt</div></div>
    <div class="metric"><div class="metric-label">Aktive Tage</div><div class="metric-value">${s.active}</div><div class="metric-sub">von ${s.totalDays}</div></div>
    <div class="metric"><div class="metric-label">Lauf-km total</div><div class="metric-value">${s.totalKm.toFixed(1)}</div><div class="metric-sub">km</div></div>
  `;

  // Heatmap
  const hl=document.getElementById('hmLabels');
  hl.innerHTML='';
  for(let d=0;d<14;d++){
    const el=document.createElement('div');
    el.className='hm-lbl';
    el.textContent=DAYS[d%7];
    hl.appendChild(el);
  }
  const hm=document.getElementById('heatmap');
  hm.innerHTML='';
  for(let i=0;i<14;i++){
    const w=Math.floor(i/7)+1, d=i%7;
    const sv=state[w][d]||{};
    const hg=GYM.some(x=>sv[x.id]);
    const hr=RUN_TYPES.some(x=>sv[x.id]);
    const cell=document.createElement('div');
    cell.className='hm-cell';
    if(hg&&hr) cell.style.background='#5DCAA5';
    else if(hg) cell.style.background='#85B7EB';
    else if(hr) cell.style.background='#ED93B1';
    hm.appendChild(cell);
  }

  // Weekly chart
  if(window._wChart) window._wChart.destroy();
  const ctx=document.getElementById('chartWeekly').getContext('2d');
  window._wChart=new Chart(ctx,{
    type:'bar',
    data:{
      labels:['W1','W2','W3','W4','W5','W6','W7','W8'],
      datasets:[
        {label:'Gym',data:s.gymPW,backgroundColor:'#378ADD',borderRadius:4},
        {label:'Laufen',data:s.runPW,backgroundColor:'#D4537E',borderRadius:4}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{grid:{display:false},ticks:{color:'#888780',font:{size:11}},border:{display:false}},
        y:{beginAtZero:true,max:7,ticks:{stepSize:1,color:'#888780',font:{size:11}},grid:{color:'rgba(136,135,128,0.12)'},border:{display:false}}
      }
    }
  });

  // Run stats
  const rs=document.getElementById('runStats');
  if(s.allRuns.length===0){
    rs.innerHTML='<div style="font-size:13px;color:var(--text3);padding:4px 0">Noch keine Lauf-Daten eingetragen.</div>';
  } else {
    rs.innerHTML=`
      <div class="run-stat-row"><span class="run-stat-label">Gesamtdistanz</span><span>${s.totalKm.toFixed(1)} km</span></div>
      <div class="run-stat-row"><span class="run-stat-label">Ø Distanz pro Lauf</span><span>${s.avgKm.toFixed(1)} km</span></div>
      <div class="run-stat-row"><span class="run-stat-label">Längster Lauf</span><span>${s.bestKm.toFixed(1)} km</span></div>
      <div class="run-stat-row"><span class="run-stat-label">Ø Pace</span><span>${fmtPace(s.avgPace)}</span></div>
      <div class="run-stat-row"><span class="run-stat-label">Anzahl Läufe</span><span>${s.allRuns.length}</span></div>
    `;
  }

  // Habit bars
  const hb=document.getElementById('habitBars');
  hb.innerHTML='';
  HABITS.forEach(h=>{
    const r=s.habitRates[h.id];
    const col=r.rate>=75?'#1D9E75':r.rate>=40?'#BA7517':'#E24B4A';
    hb.innerHTML+=`<div class="habit-bar-row">
      <div class="habit-bar-top"><span>${r.label}</span><span class="habit-bar-pct">${r.done}/${s.totalDays} · ${r.rate}%</span></div>
      <div class="bar-bg"><div class="bar-fill" style="width:${r.rate}%;background:${col}"></div></div>
    </div>`;
  });

  // Streaks
  const sl=document.getElementById('streakList');
  sl.innerHTML='';
  HABITS.forEach(h=>{
    const r=s.streaks[h.id];
    sl.innerHTML+=`<div class="streak-row"><span>${r.label}</span><span class="streak-val">Aktuell: <b>${r.current}d</b> · Max: ${r.max}d</span></div>`;
  });
}

loadState();
renderWeekChips();
renderDayCards();
</script>
</body>
</html>
