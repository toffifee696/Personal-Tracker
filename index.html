<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trainings-Tracker">
<meta name="theme-color" content="#0a0a0a">
<title>Trainings-Tracker</title>
<style>
:root{
  --bg:#0a0a0a;--bg3:#1c1c1c;--card:#181818;
  --border:rgba(255,255,255,0.07);--bm:rgba(255,255,255,0.14);
  --t:#f0f0ee;--t2:#888884;--t3:#555552;
  --acc:#00e5a0;--accDim:#003d2a;
  --blue:#4da6ff;--blueDim:#0d2a4a;
  --pink:#ff6b9d;--pinkDim:#3d0f20;
  --amber:#ffb347;--amberDim:#3d2a0a;
  --r:14px;--rs:10px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:var(--bg);color:var(--t);font-size:15px;min-height:100vh}
.main{padding:calc(var(--safe-top) + 16px) 16px calc(var(--safe-bot) + 150px)}
.page{display:none}.page.active{display:block}
.page-title{font-size:24px;font-weight:700;margin-bottom:16px;letter-spacing:-0.3px}
.week-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:16px;scrollbar-width:none}
.week-scroll::-webkit-scrollbar{display:none}
.wchip{flex-shrink:0;padding:7px 16px;border-radius:20px;border:0.5px solid var(--bm);background:transparent;color:var(--t2);font-size:13px;font-family:inherit;cursor:pointer;transition:all .15s}
.wchip.active{background:var(--acc);color:#000;border-color:transparent;font-weight:600}
.dcard{background:var(--card);border-radius:var(--r);border:0.5px solid var(--border);margin-bottom:10px;overflow:hidden}
.dhead{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.dname{font-size:15px;font-weight:600;pointer-events:none}
.dsum{font-size:12px;color:var(--t3);display:flex;gap:6px;align-items:center;pointer-events:none}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dbody{padding:0 16px 14px;border-top:0.5px solid var(--border)}
.sec-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;padding:12px 0 6px;font-weight:600}
.crow{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--border);cursor:pointer;user-select:none;-webkit-user-select:none}
.crow:last-child{border-bottom:none}
.cb{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--bm);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;pointer-events:none}
.cb.on{background:var(--acc);border-color:var(--acc)}
.cb.on::after{content:'';display:block;width:6px;height:10px;border:2px solid #000;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px)}
.clbl{font-size:14px;flex:1;color:var(--t);pointer-events:none}
.clbl.done{color:var(--t3);text-decoration:line-through}
.cbadge{font-size:10px;padding:3px 9px;border-radius:20px;flex-shrink:0;font-weight:500;pointer-events:none}
.bg{background:var(--blueDim);color:var(--blue)}
.rg{background:var(--pinkDim);color:var(--pink)}
.hg{background:var(--accDim);color:var(--acc)}
.run-inp{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:10px 0 4px}
.rf{display:flex;flex-direction:column;gap:5px}
.rf label{font-size:11px;color:var(--t3);font-weight:500}
.rf input{background:var(--bg3);border:0.5px solid var(--bm);border-radius:var(--rs);padding:10px 12px;font-size:15px;font-family:inherit;color:var(--t);width:100%}
.rf input:focus{outline:none;border-color:var(--acc)}
.pace{font-size:12px;color:var(--acc);min-height:18px;padding-bottom:4px;font-weight:500}
.savebar{position:fixed;bottom:calc(var(--safe-bot) + 58px);left:0;right:0;padding:10px 16px;background:rgba(10,10,10,0.95);border-top:0.5px solid var(--border);display:flex;align-items:center;gap:12px;z-index:99;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.savebtn{flex:1;padding:13px;background:var(--acc);color:#000;border:none;border-radius:var(--rs);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}
.toast{font-size:13px;color:var(--acc);opacity:0;transition:opacity .3s;min-width:80px}
.botnav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,10,0.97);border-top:0.5px solid var(--border);display:flex;z-index:100;padding-bottom:var(--safe-bot);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.nbtn{flex:1;padding:10px 0 8px;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--t3);font-size:10px;font-family:inherit;transition:color .15s}
.nbtn.active{color:var(--acc)}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.met{background:var(--card);border-radius:var(--r);padding:16px;border:0.5px solid var(--border)}
.mlbl{font-size:11px;color:var(--t3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;font-weight:500}
.mval{font-size:28px;font-weight:700;color:var(--t)}
.msub{font-size:11px;color:var(--t3);margin-top:2px}
.sc{background:var(--card);border-radius:var(--r);border:0.5px solid var(--border);padding:16px;margin-bottom:10px}
.stitle{font-size:15px;font-weight:600;margin-bottom:14px}
.legrow{display:flex;gap:14px;margin-bottom:10px;font-size:12px;color:var(--t2);flex-wrap:wrap}
.lsq{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle}
.hbrow{margin-bottom:12px}
.hbtop{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
.hbpct{color:var(--t2);font-size:12px}
.barbg{background:var(--bg3);border-radius:4px;height:6px;overflow:hidden}
.barfill{height:6px;border-radius:4px}
.strow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid var(--border);font-size:13px}
.strow:last-child{border-bottom:none}
.stval{color:var(--t2);font-size:12px}
.rsrow{display:flex;justify-content:space-between;padding:9px 0;border-bottom:0.5px solid var(--border);font-size:13px}
.rsrow:last-child{border-bottom:none}
.rslbl{color:var(--t2)}
.hmgrid{display:grid;grid-template-columns:repeat(14,1fr);gap:3px;margin:8px 0}
.hmlbls{display:grid;grid-template-columns:repeat(14,1fr);gap:3px;margin-bottom:3px}
.hmlbl{font-size:8px;color:var(--t3);text-align:center}
.hmcell{aspect-ratio:1;border-radius:3px;background:var(--bg3)}
.hmleg{display:flex;gap:12px;font-size:11px;color:var(--t2);margin-top:8px;flex-wrap:wrap}
.cw{position:relative;width:100%}
.settings-section{margin-bottom:20px}
.settings-title{font-size:13px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.item-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border-radius:var(--rs);border:0.5px solid var(--border);margin-bottom:6px}
.item-label{flex:1;font-size:14px;color:var(--t)}
.item-badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:500;flex-shrink:0}
.btn-icon{width:32px;height:32px;border-radius:8px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t3);flex-shrink:0}
.btn-del{color:#ff5555}
.add-row{display:flex;gap:8px;margin-top:8px}
.add-inp{flex:1;background:var(--bg3);border:0.5px solid var(--bm);border-radius:var(--rs);padding:10px 14px;font-size:14px;font-family:inherit;color:var(--t)}
.add-inp:focus{outline:none;border-color:var(--acc)}
.btn-add{padding:10px 18px;background:var(--acc);color:#000;border:none;border-radius:var(--rs);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;flex-shrink:0}
.edit-inp{background:var(--bg3);border:0.5px solid var(--acc);border-radius:8px;padding:6px 10px;font-size:14px;font-family:inherit;color:var(--t);flex:1;min-width:0}
.edit-inp:focus{outline:none}
.offline-banner{display:none;background:var(--amberDim);color:var(--amber);font-size:12px;text-align:center;padding:6px;position:fixed;top:0;left:0;right:0;z-index:200;font-weight:500}
</style>
</head>
<body>
<div class="offline-banner" id="offlineBanner">Offline – Daten werden lokal gespeichert</div>
<div class="main">

  <div class="page active" id="pg-tracker">
    <div class="page-title">Tracker</div>
    <div class="week-scroll" id="wchips"></div>
    <div id="dcards"></div>
  </div>

  <div class="page" id="pg-stats">
    <div class="page-title">Statistiken</div>
    <div class="mgrid" id="smets"></div>
    <div class="sc">
      <div class="stitle">Heatmap (Wo 1–8)</div>
      <div class="hmlbls" id="hmlbls"></div>
      <div class="hmgrid" id="hmgrid"></div>
      <div class="hmleg">
        <span><span class="lsq" style="background:#4da6ff"></span>Gym</span>
        <span><span class="lsq" style="background:#ff6b9d"></span>Laufen</span>
        <span><span class="lsq" style="background:#00e5a0"></span>Beides</span>
      </div>
    </div>
    <div class="sc">
      <div class="stitle">Trainings pro Woche</div>
      <div class="legrow">
        <span><span class="lsq" style="background:#4da6ff"></span>Gym</span>
        <span><span class="lsq" style="background:#ff6b9d"></span>Laufen</span>
      </div>
      <div class="cw" style="height:200px"><canvas id="cwkly"></canvas></div>
    </div>
    <div class="sc"><div class="stitle">Lauf-Statistiken</div><div id="rstats"></div></div>
    <div class="sc"><div class="stitle">Gewohnheiten – Umsetzungsrate</div><div id="hbars"></div></div>
    <div class="sc"><div class="stitle">Streak pro Gewohnheit</div><div id="slist"></div></div>
  </div>

  <div class="page" id="pg-settings">
    <div class="page-title">Einstellungen</div>
    <div class="settings-section">
      <div class="settings-title">Gym-Einheiten</div>
      <div id="set-gym"></div>
      <div class="add-row">
        <input class="add-inp" id="inp-gym" placeholder="Name der Einheit…" maxlength="40">
        <button class="btn-add" id="btn-gym">+</button>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-title">Lauf-Typen</div>
      <div id="set-run"></div>
      <div class="add-row">
        <input class="add-inp" id="inp-run" placeholder="Name des Lauf-Typs…" maxlength="40">
        <button class="btn-add" id="btn-run">+</button>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-title">Gewohnheiten</div>
      <div id="set-hab"></div>
      <div class="add-row">
        <input class="add-inp" id="inp-hab" placeholder="Name der Gewohnheit…" maxlength="40">
        <button class="btn-add" id="btn-hab">+</button>
      </div>
    </div>
  </div>

</div>

<div class="savebar" id="savebar">
  <button class="savebtn" id="savebtn">Speichern</button>
  <span class="toast" id="toast">Gespeichert ✓</span>
</div>

<nav class="botnav">
  <button class="nbtn active" id="nb-tracker">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
    Tracker
  </button>
  <button class="nbtn" id="nb-stats">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Statistiken
  </button>
  <button class="nbtn" id="nb-settings">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    Einstellungen
  </button>
</nav>

<script>
// ── Service Worker ──────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  const sw=`const C='trk-v2';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['/'])).then(()=>self.skipWaiting()))});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))).then(()=>self.clients.claim()))});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{if(res.ok){const cl=res.clone();caches.open(C).then(c=>c.put(e.request,cl))}return res}).catch(()=>caches.match('/'))))});`;
  try{navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'})));}catch(e){}
}
window.addEventListener('online', ()=>document.getElementById('offlineBanner').style.display='none');
window.addEventListener('offline',()=>document.getElementById('offlineBanner').style.display='block');
if(!navigator.onLine) document.getElementById('offlineBanner').style.display='block';

// ── Constants & State ───────────────────────────────────────────────────────
const WKS=8, DN=['Mo','Di','Mi','Do','Fr','Sa','So'];

const DEFAULT_GYM=[
  {id:'g1',l:'Push I'},{id:'g2',l:'Pull I'},{id:'g3',l:'Legs I + Core'},
  {id:'g4',l:'Push II'},{id:'g5',l:'Pull II'},{id:'g6',l:'Legs II + Core'}
];
const DEFAULT_RUN=[{id:'r1',l:'Zone 2 – Easy'},{id:'r2',l:'Intervall'}];
const DEFAULT_HAB=[
  {id:'h1',l:'Nicht geraucht'},{id:'h2',l:'500 kcal Defizit'},
  {id:'h3',l:'7+ h Schlaf'},{id:'h4',l:'2+ L Wasser'},{id:'h5',l:'Mobilisation'}
];

let GYM=[], RUN=[], HAB=[];
let cw=1, expDay=null, st={};
let currentPage='tracker';

// ── Storage ─────────────────────────────────────────────────────────────────
function sk(w,d){return 'tk_w'+w+'_d'+d;}

function loadConfig(){
  try{const g=localStorage.getItem('cfg_gym'); GYM=g?JSON.parse(g):[...DEFAULT_GYM];}catch(e){GYM=[...DEFAULT_GYM];}
  try{const r=localStorage.getItem('cfg_run'); RUN=r?JSON.parse(r):[...DEFAULT_RUN];}catch(e){RUN=[...DEFAULT_RUN];}
  try{const h=localStorage.getItem('cfg_hab'); HAB=h?JSON.parse(h):[...DEFAULT_HAB];}catch(e){HAB=[...DEFAULT_HAB];}
}
function saveConfig(){
  localStorage.setItem('cfg_gym',JSON.stringify(GYM));
  localStorage.setItem('cfg_run',JSON.stringify(RUN));
  localStorage.setItem('cfg_hab',JSON.stringify(HAB));
}
function loadDays(){
  st={};
  for(let w=1;w<=WKS;w++){
    st[w]={};
    for(let d=0;d<7;d++){
      try{const r=localStorage.getItem(sk(w,d));st[w][d]=r?JSON.parse(r):{}}
      catch(e){st[w][d]={};}
    }
  }
}
function saveAll(){
  for(let w=1;w<=WKS;w++)
    for(let d=0;d<7;d++)
      try{localStorage.setItem(sk(w,d),JSON.stringify(st[w][d]||{}));}catch(e){}
  saveConfig();
  const t=document.getElementById('toast');
  t.style.opacity='1';
  setTimeout(()=>t.style.opacity='0',2000);
}

// ── Navigation ───────────────────────────────────────────────────────────────
// FIX: close any open day when leaving tracker so state is clean on return
function showPg(id){
  if(currentPage==='tracker') expDay=null; // reset expanded day
  currentPage=id;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('pg-'+id).classList.add('active');
  document.getElementById('nb-'+id).classList.add('active');
  document.getElementById('savebar').style.display = id==='tracker' ? 'flex' : 'none';
  if(id==='tracker'){renderChips();renderCards();}
  if(id==='stats')  renderStats();
  if(id==='settings') renderSettings();
}

// ── Tracker ──────────────────────────────────────────────────────────────────
function renderChips(){
  const c=document.getElementById('wchips');c.innerHTML='';
  for(let w=1;w<=WKS;w++){
    const b=document.createElement('button');
    b.className='wchip'+(w===cw?' active':'');
    b.textContent='Wo '+w;
    b.addEventListener('click',()=>{cw=w;expDay=null;renderChips();renderCards();});
    c.appendChild(b);
  }
}

function buildCheckRow(label, badgeClass, badgeLabel, isOn, clickFn){
  const row=document.createElement('div');
  row.className='crow';
  const cb=document.createElement('div');
  cb.className='cb'+(isOn?' on':'');
  const lbl=document.createElement('span');
  lbl.className='clbl'+(isOn?' done':'');
  lbl.textContent=label;
  const badge=document.createElement('span');
  badge.className='cbadge '+badgeClass;
  badge.textContent=badgeLabel;
  row.appendChild(cb);row.appendChild(lbl);row.appendChild(badge);
  // FIX: use touchend+click with flag to avoid double-fire on iOS
  let tapped=false;
  row.addEventListener('touchend',e=>{e.preventDefault();tapped=true;clickFn();});
  row.addEventListener('click',()=>{if(!tapped)clickFn();tapped=false;});
  return row;
}

function renderCards(){
  const container=document.getElementById('dcards');
  container.innerHTML='';
  for(let d=0;d<7;d++){
    const s=st[cw][d]||{};
    const open=expDay===d;
    const hg=GYM.some(x=>s[x.id]);
    const hr=RUN.some(x=>s[x.id]);
    const hc=HAB.filter(x=>s[x.id]).length;

    const card=document.createElement('div');
    card.className='dcard';

    // header
    const head=document.createElement('div');
    head.className='dhead';
    const nameEl=document.createElement('span');
    nameEl.className='dname';nameEl.textContent=DN[d];
    const sumEl=document.createElement('div');
    sumEl.className='dsum';
    if(hg){const dot=document.createElement('span');dot.className='dot';dot.style.background='#4da6ff';sumEl.appendChild(dot);}
    if(hr){const dot=document.createElement('span');dot.className='dot';dot.style.background='#ff6b9d';sumEl.appendChild(dot);}
    if(hc){const cnt=document.createElement('span');cnt.style.fontSize='11px';cnt.style.color='var(--t2)';cnt.textContent=hc+'/'+HAB.length;sumEl.appendChild(cnt);}
    const arrow=document.createElement('svg');
    arrow.setAttribute('width','16');arrow.setAttribute('height','16');arrow.setAttribute('viewBox','0 0 24 24');
    arrow.setAttribute('fill','none');arrow.setAttribute('stroke','currentColor');arrow.setAttribute('stroke-width','2.2');
    arrow.style.cssText='transition:transform .2s;flex-shrink:0;';
    arrow.style.transform=open?'rotate(180deg)':'rotate(0deg)';
    arrow.innerHTML='<polyline points="6 9 12 15 18 9"/>';
    sumEl.appendChild(arrow);
    head.appendChild(nameEl);head.appendChild(sumEl);

    // FIX: attach head click via addEventListener, not onclick attribute
    let headTapped=false;
    head.addEventListener('touchend',e=>{e.preventDefault();headTapped=true;togDay(d);});
    head.addEventListener('click',()=>{if(!headTapped)togDay(d);headTapped=false;});
    card.appendChild(head);

    if(open){
      const body=document.createElement('div');
      body.className='dbody';

      // Gym rows
      if(GYM.length){
        const lbl=document.createElement('div');lbl.className='sec-lbl';lbl.textContent='Gym';body.appendChild(lbl);
        GYM.forEach(g=>{
          body.appendChild(buildCheckRow(g.l,'bg','Gym',!!s[g.id],()=>{
            st[cw][d][g.id]=!st[cw][d][g.id];renderCards();
          }));
        });
      }

      // Run rows + inputs
      if(RUN.length){
        const lbl=document.createElement('div');lbl.className='sec-lbl';lbl.textContent='Laufen';body.appendChild(lbl);
        RUN.forEach(r=>{
          body.appendChild(buildCheckRow(r.l,'rg','Laufen',!!s[r.id],()=>{
            st[cw][d][r.id]=!st[cw][d][r.id];renderCards();
          }));
        });
        // run inputs
        const ri=document.createElement('div');ri.className='run-inp';
        [['run_km','Distanz (km)','decimal','5.0'],['run_min','Zeit (min)','numeric','43'],['run_sec','Sek.','numeric','00']].forEach(([field,label,mode,ph])=>{
          const rf=document.createElement('div');rf.className='rf';
          const lb=document.createElement('label');lb.textContent=label;
          const inp=document.createElement('input');
          inp.type='number';inp.inputMode=mode;inp.placeholder=ph;
          inp.value=s[field]||'';
          if(field==='run_km'){inp.step='0.1';inp.min='0';}
          if(field==='run_sec'){inp.min='0';inp.max='59';}
          inp.addEventListener('change',()=>{
            if(!st[cw][d])st[cw][d]={};
            st[cw][d][field]=inp.value;
            updPace(d);
          });
          rf.appendChild(lb);rf.appendChild(inp);ri.appendChild(rf);
        });
        body.appendChild(ri);
        const paceEl=document.createElement('div');paceEl.className='pace';paceEl.id='pace_'+d;body.appendChild(paceEl);
        setTimeout(()=>updPace(d),10);
      }

      // Habit rows
      if(HAB.length){
        const lbl=document.createElement('div');lbl.className='sec-lbl';lbl.textContent='Gewohnheiten';body.appendChild(lbl);
        HAB.forEach(h=>{
          body.appendChild(buildCheckRow(h.l,'hg','Habit',!!s[h.id],()=>{
            st[cw][d][h.id]=!st[cw][d][h.id];renderCards();
          }));
        });
      }
      card.appendChild(body);
    }
    container.appendChild(card);
  }
}

function togDay(d){
  expDay = expDay===d ? null : d;
  renderCards();
  if(expDay!==null){
    setTimeout(()=>{
      const cards=document.querySelectorAll('.dcard');
      if(cards[d]) cards[d].scrollIntoView({behavior:'smooth',block:'nearest'});
    },80);
  }
}

function updPace(d){
  const el=document.getElementById('pace_'+d);
  if(!el)return;
  const s=st[cw][d]||{};
  const tm=(parseFloat(s.run_min)||0)+(parseFloat(s.run_sec)||0)/60;
  const km=parseFloat(s.run_km)||0;
  if(!km||!tm){el.textContent='';return;}
  const p=tm/km,pm=Math.floor(p),ps=Math.round((p-pm)*60);
  el.textContent='Pace: '+pm+':'+(ps<10?'0':'')+ps+' min/km';
}

// ── Settings ─────────────────────────────────────────────────────────────────
function uid(){return 'i'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

function renderSettings(){
  renderSettingsList('set-gym',GYM,'gym');
  renderSettingsList('set-run',RUN,'run');
  renderSettingsList('set-hab',HAB,'hab');
}

function renderSettingsList(elId,arr,type){
  const c=document.getElementById(elId);
  c.innerHTML='';
  const badgeClass=type==='gym'?'bg':type==='run'?'rg':'hg';
  const badgeLabel=type==='gym'?'Gym':type==='run'?'Laufen':'Habit';

  arr.forEach((item,i)=>{
    const row=document.createElement('div');row.className='item-row';

    const lbl=document.createElement('span');lbl.className='item-label';lbl.textContent=item.l;

    const badge=document.createElement('span');badge.className='item-badge '+badgeClass;badge.textContent=badgeLabel;

    // edit btn
    const editBtn=document.createElement('button');editBtn.className='btn-icon';
    editBtn.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
    editBtn.addEventListener('click',()=>startEdit(type,i,arr,row,lbl));

    // del btn
    const delBtn=document.createElement('button');delBtn.className='btn-icon btn-del';
    delBtn.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>';
    delBtn.addEventListener('click',()=>{arr.splice(i,1);saveConfig();renderSettings();});

    row.appendChild(lbl);row.appendChild(badge);row.appendChild(editBtn);row.appendChild(delBtn);
    c.appendChild(row);
  });
}

function startEdit(type,i,arr,row,lbl){
  // FIX: prevent double-blur by tracking if save already happened
  let saved=false;
  const inp=document.createElement('input');
  inp.className='edit-inp';inp.value=arr[i].l;
  lbl.replaceWith(inp);
  inp.focus();inp.select();

  function commitEdit(){
    if(saved)return;saved=true;
    const v=inp.value.trim();
    if(v) arr[i].l=v;
    saveConfig();
    renderSettings();
    // FIX: do NOT call renderCards() here – tracker state is fine, labels reload on next open
  }
  inp.addEventListener('blur',commitEdit);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();inp.blur();}if(e.key==='Escape'){saved=true;renderSettings();}});
}

function addItem(type){
  const inp=document.getElementById('inp-'+type);
  const v=inp.value.trim();if(!v)return;
  const arr=type==='gym'?GYM:type==='run'?RUN:HAB;
  arr.push({id:uid(),l:v});
  inp.value='';
  saveConfig();renderSettings();
}

// ── Stats ────────────────────────────────────────────────────────────────────
function fmtP(p){if(!p)return'–';const pm=Math.floor(p),ps=Math.round((p-pm)*60);return pm+':'+(ps<10?'0':'')+ps+' min/km';}

function renderStats(){
  let tg=0,tr=0,act=0,td=WKS*7,gPW=[],rPW=[],runs=[];
  for(let w=1;w<=WKS;w++){
    let g=0,r=0;
    for(let d=0;d<7;d++){
      const s=st[w][d]||{};
      const hg=GYM.some(x=>s[x.id]),hr=RUN.some(x=>s[x.id]);
      if(hg){g++;tg++;}
      if(hr){r++;tr++;if(s.run_km){const tm=(parseFloat(s.run_min)||0)+(parseFloat(s.run_sec)||0)/60;runs.push({km:parseFloat(s.run_km),min:tm});}}
      if(hg||hr)act++;
    }
    gPW.push(g);rPW.push(r);
  }
  const tkm=runs.reduce((a,r)=>a+r.km,0);
  const avgKm=runs.length?tkm/runs.length:0;
  const bestKm=runs.length?Math.max(...runs.map(r=>r.km)):0;
  const rWP=runs.filter(r=>r.min>0&&r.km>0);
  const avgP=rWP.length?rWP.reduce((a,r)=>a+r.min/r.km,0)/rWP.length:0;

  document.getElementById('smets').innerHTML=`
    <div class="met"><div class="mlbl">Gym</div><div class="mval">${tg}</div><div class="msub">Einheiten gesamt</div></div>
    <div class="met"><div class="mlbl">Laufen</div><div class="mval">${tr}</div><div class="msub">Einheiten gesamt</div></div>
    <div class="met"><div class="mlbl">Aktive Tage</div><div class="mval">${act}</div><div class="msub">von ${td}</div></div>
    <div class="met"><div class="mlbl">Lauf-km</div><div class="mval">${tkm.toFixed(1)}</div><div class="msub">km total</div></div>`;

  const hl=document.getElementById('hmlbls');hl.innerHTML='';
  for(let i=0;i<14;i++){const e=document.createElement('div');e.className='hmlbl';e.textContent=DN[i%7];hl.appendChild(e);}
  const hm=document.getElementById('hmgrid');hm.innerHTML='';
  for(let i=0;i<14;i++){
    const w=Math.floor(i/7)+1,d=i%7,sv=st[w][d]||{};
    const hg=GYM.some(x=>sv[x.id]),hr=RUN.some(x=>sv[x.id]);
    const cell=document.createElement('div');cell.className='hmcell';
    if(hg&&hr)cell.style.background='#00e5a0';
    else if(hg)cell.style.background='#4da6ff';
    else if(hr)cell.style.background='#ff6b9d';
    hm.appendChild(cell);
  }

  if(window._wc)window._wc.destroy();
  window._wc=new Chart(document.getElementById('cwkly').getContext('2d'),{
    type:'bar',
    data:{labels:['W1','W2','W3','W4','W5','W6','W7','W8'],datasets:[
      {label:'Gym',data:gPW,backgroundColor:'#4da6ff',borderRadius:4},
      {label:'Laufen',data:rPW,backgroundColor:'#ff6b9d',borderRadius:4}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{
        x:{grid:{display:false},ticks:{color:'#555552',font:{size:11}},border:{display:false}},
        y:{beginAtZero:true,max:7,ticks:{stepSize:1,color:'#555552',font:{size:11}},grid:{color:'rgba(255,255,255,0.05)'},border:{display:false}}
      }}
  });

  const rs=document.getElementById('rstats');
  rs.innerHTML=runs.length===0
    ?'<div style="font-size:13px;color:var(--t3);padding:4px 0">Noch keine Lauf-Daten eingetragen.</div>'
    :`<div class="rsrow"><span class="rslbl">Gesamtdistanz</span><span>${tkm.toFixed(1)} km</span></div>
      <div class="rsrow"><span class="rslbl">Ø Distanz</span><span>${avgKm.toFixed(1)} km</span></div>
      <div class="rsrow"><span class="rslbl">Längster Lauf</span><span>${bestKm.toFixed(1)} km</span></div>
      <div class="rsrow"><span class="rslbl">Ø Pace</span><span>${fmtP(avgP)}</span></div>
      <div class="rsrow"><span class="rslbl">Anzahl Läufe</span><span>${runs.length}</span></div>`;

  const hb=document.getElementById('hbars');hb.innerHTML='';
  if(!HAB.length){hb.innerHTML='<div style="font-size:13px;color:var(--t3)">Keine Gewohnheiten konfiguriert.</div>';}
  else{HAB.forEach(h=>{
    let done=0;
    for(let w=1;w<=WKS;w++)for(let d=0;d<7;d++)if((st[w][d]||{})[h.id])done++;
    const rate=Math.round(done/td*100);
    const col=rate>=75?'#00e5a0':rate>=40?'#ffb347':'#ff5555';
    hb.innerHTML+=`<div class="hbrow"><div class="hbtop"><span>${h.l}</span><span class="hbpct">${done}/${td} · ${rate}%</span></div><div class="barbg"><div class="barfill" style="width:${rate}%;background:${col}"></div></div></div>`;
  });}

  const sl=document.getElementById('slist');sl.innerHTML='';
  HAB.forEach(h=>{
    let cur=0,max=0;
    for(let w=1;w<=WKS;w++)for(let d=0;d<7;d++){if((st[w][d]||{})[h.id]){cur++;max=Math.max(max,cur);}else cur=0;}
    sl.innerHTML+=`<div class="strow"><span>${h.l}</span><span class="stval">Aktuell: <b style="color:var(--acc)">${cur}d</b> · Max: ${max}d</span></div>`;
  });
}

// ── Wire up buttons (no inline onclick) ──────────────────────────────────────
document.getElementById('nb-tracker').addEventListener('click',()=>showPg('tracker'));
document.getElementById('nb-stats').addEventListener('click',()=>showPg('stats'));
document.getElementById('nb-settings').addEventListener('click',()=>showPg('settings'));
document.getElementById('savebtn').addEventListener('click',saveAll);
document.getElementById('btn-gym').addEventListener('click',()=>addItem('gym'));
document.getElementById('btn-run').addEventListener('click',()=>addItem('run'));
document.getElementById('btn-hab').addEventListener('click',()=>addItem('hab'));
document.getElementById('inp-gym').addEventListener('keydown',e=>{if(e.key==='Enter')addItem('gym');});
document.getElementById('inp-run').addEventListener('keydown',e=>{if(e.key==='Enter')addItem('run');});
document.getElementById('inp-hab').addEventListener('keydown',e=>{if(e.key==='Enter')addItem('hab');});
</script>
